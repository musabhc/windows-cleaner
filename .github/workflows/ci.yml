name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore app
        shell: pwsh
        run: dotnet restore src/TemizPC.App/TemizPC.App.csproj

      - name: Restore tests
        shell: pwsh
        run: dotnet restore tests/TemizPC.Tests/TemizPC.Tests.csproj

      - name: Build app
        shell: pwsh
        run: dotnet build src/TemizPC.App/TemizPC.App.csproj -c Release --no-restore

      - name: Build tests
        shell: pwsh
        run: dotnet build tests/TemizPC.Tests/TemizPC.Tests.csproj -c Release --no-restore

      - name: Run tests
        shell: pwsh
        run: dotnet test tests/TemizPC.Tests/TemizPC.Tests.csproj -c Release --no-build -v m
